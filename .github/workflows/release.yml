name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-notes:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.notes.outputs.body }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine release metadata
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == *"beta"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="release-notes/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            {
              echo "body<<RELEASE_NOTES_EOF"
              cat "$NOTES_FILE"
              echo "RELEASE_NOTES_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "body=Release ${TAG} of Maravilla Konto." >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: release-notes
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin --bundles dmg'
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: windows-latest
            args: '--bundles nsis'
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS targets
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src-tauri
          tauriScript: npx --prefix frontend tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Maravilla Konto ${{ github.ref_name }}'
          releaseBody: ${{ needs.release-notes.outputs.body }}
          releaseDraft: false
          prerelease: ${{ needs.release-notes.outputs.prerelease == 'true' }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

  publish:
    needs: [release-notes, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          TAG="${GITHUB_REF_NAME}"
          # Download all assets from the release
          gh release download "$TAG" --dir artifacts --repo ${{ github.repository }}
          echo "Downloaded artifacts:"
          ls -la artifacts/

      - name: Prepare release notes markdown
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="release-notes/${TAG}.md"
          mkdir -p deploy
          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" deploy/notes.md
          fi

      - name: Deploy to gh-pages branch
        env:
          DEPLOY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          BETA_PATH="i9PzuZMDu283vAbf5a13AQ"

          # Clone the gh-pages branch
          git clone --branch gh-pages --single-branch \
            "https://x-access-token:${DEPLOY_TOKEN}@github.com/${{ github.repository }}.git" pages-repo

          # Create releases directory
          mkdir -p "pages-repo/${BETA_PATH}/releases"

          # Copy latest.json (updater manifest)
          if [ -f artifacts/latest.json ]; then
            cp artifacts/latest.json "pages-repo/${BETA_PATH}/releases/latest.json"
          fi

          # Copy release notes
          if [ -f deploy/notes.md ]; then
            cp deploy/notes.md "pages-repo/${BETA_PATH}/releases/notes.md"
          fi

          # Copy installer artifacts (DMG, EXE, sig files)
          for f in artifacts/*.dmg artifacts/*.exe artifacts/*.nsis.zip artifacts/*.sig artifacts/*.tar.gz; do
            [ -f "$f" ] && cp "$f" "pages-repo/${BETA_PATH}/releases/"
          done

          # Rewrite latest.json URLs to point to Pages
          if [ -f "pages-repo/${BETA_PATH}/releases/latest.json" ]; then
            PAGES_BASE="https://maravilla-labs.github.io/konto/${BETA_PATH}/releases"
            cd "pages-repo/${BETA_PATH}/releases"
            # Replace GitHub release URLs with Pages URLs
            python3 -c "
          import json, os, re
          with open('latest.json', 'r') as f:
              data = json.load(f)
          for platform in data.get('platforms', {}).values():
              url = platform.get('url', '')
              filename = url.rsplit('/', 1)[-1] if '/' in url else url
              platform['url'] = '${PAGES_BASE}/' + filename
          with open('latest.json', 'w') as f:
              json.dump(data, f, indent=2)
          "
            cd -
          fi

          # Commit and push
          cd pages-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || {
            git commit -m "deploy ${TAG}"
            git push
          }
