<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maravilla Konto Beta</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600&family=JetBrains+Mono:wght@400&display=swap');

  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

  :root {
    --navy: #0a0e1a;
    --navy-card: rgba(17, 22, 40, 0.7);
    --blue: #6B9BF7;
    --blue-glow: rgba(107, 155, 247, 0.15);
    --blue-border: rgba(107, 155, 247, 0.12);
    --green: #5ae0a0;
    --text: #e8ecf4;
    --text-muted: rgba(255,255,255,0.4);
    --text-dim: rgba(255,255,255,0.2);
    --radius: 14px;
  }

  html {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--text);
    scroll-behavior: smooth;
  }

  body {
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 30% 20%, rgba(107, 155, 247, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 70% 80%, rgba(90, 224, 160, 0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
    background-size: 72px 72px;
    pointer-events: none;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 32px 40px;
  }

  /* Top bar: logo + badge */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    width: 36px;
    height: 36px;
    filter: drop-shadow(0 0 12px rgba(107, 155, 247, 0.25));
  }

  .topbar-title {
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .beta-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--blue-border);
    background: rgba(107, 155, 247, 0.08);
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--blue);
    margin-left: auto;
  }

  .beta-badge::before {
    content: '';
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px rgba(90, 224, 160, 0.5);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Hero: two columns */
  .hero {
    display: grid;
    grid-template-columns: 1fr 1.3fr;
    gap: 40px;
    align-items: center;
    margin-bottom: 40px;
    animation: fadeUp 0.6s 0.08s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .hero-left h1 {
    font-size: clamp(1.6rem, 3.5vw, 2.2rem);
    font-weight: 400;
    letter-spacing: 0.04em;
    line-height: 1.2;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #fff 30%, var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-left .subtitle {
    font-size: 0.85rem;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.03em;
    margin-bottom: 24px;
  }

  .downloads {
    display: flex;
    gap: 10px;
  }

  .download-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 10px;
    border: 1px solid var(--blue-border);
    background: var(--navy-card);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    text-decoration: none;
    color: var(--text);
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    cursor: pointer;
    white-space: nowrap;
  }

  .download-btn:hover {
    border-color: rgba(107, 155, 247, 0.35);
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(107, 155, 247, 0.1);
    background: rgba(107, 155, 247, 0.08);
  }

  .download-btn .icon {
    width: 18px;
    height: 18px;
    color: var(--blue);
    flex-shrink: 0;
  }

  .download-btn .label {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .download-btn .platform {
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  .download-btn .format {
    font-size: 0.6rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .download-btn.disabled {
    pointer-events: none;
    opacity: 0.35;
  }

  .download-btn.disabled .format { display: none; }
  .download-btn.disabled .unavailable { display: block; }
  .download-btn .unavailable {
    display: none;
    font-size: 0.6rem;
    color: var(--text-dim);
  }

  .version-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-top: 12px;
  }

  /* Screenshot */
  .hero-right {
    position: relative;
  }

  .hero-right::after {
    content: '';
    position: absolute;
    bottom: -20px;
    left: 10%;
    right: 10%;
    height: 40px;
    background: radial-gradient(ellipse, rgba(107, 155, 247, 0.1) 0%, transparent 70%);
    filter: blur(16px);
  }

  .screenshot {
    width: 100%;
    border-radius: var(--radius);
    display: block;
    box-shadow:
      0 4px 20px rgba(0,0,0,0.4),
      0 0 0 1px rgba(255,255,255,0.04);
    position: relative;
    z-index: 1;
  }

  /* Release notes */
  .notes-section {
    animation: fadeUp 0.6s 0.16s cubic-bezier(0.16, 1, 0.3, 1) both;
    margin-bottom: 40px;
  }

  .notes-header {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  #release-notes {
    font-size: 0.85rem;
    line-height: 1.65;
    color: rgba(255,255,255,0.6);
    columns: 2;
    column-gap: 32px;
  }

  #release-notes h1,
  #release-notes h2,
  #release-notes h3 {
    font-weight: 500;
    color: var(--text);
    margin: 16px 0 6px;
    font-size: 0.9rem;
    letter-spacing: 0.02em;
    column-span: all;
  }

  #release-notes h1:first-child,
  #release-notes h2:first-child,
  #release-notes h3:first-child { margin-top: 0; }

  #release-notes ul {
    list-style: none;
    padding: 0;
    break-inside: avoid;
  }

  #release-notes li {
    position: relative;
    padding-left: 14px;
    margin-bottom: 4px;
  }

  #release-notes li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 9px;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--blue);
    opacity: 0.6;
  }

  #release-notes strong { color: var(--text); font-weight: 500; }

  #release-notes code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8em;
    padding: 1px 6px;
    border-radius: 4px;
    background: rgba(107, 155, 247, 0.1);
    color: var(--blue);
  }

  .notes-loading {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    font-size: 0.8rem;
  }

  .spinner {
    width: 12px;
    height: 12px;
    border: 1.5px solid var(--text-dim);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Footer */
  footer {
    text-align: center;
    padding: 20px 0;
    border-top: 1px solid rgba(255,255,255,0.04);
    animation: fadeUp 0.6s 0.24s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  footer p {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* Mobile: stack to single column */
  @media (max-width: 640px) {
    .page { padding: 32px 20px 32px; }

    .hero {
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .hero-right { order: -1; }

    .downloads { flex-direction: column; }

    #release-notes { columns: 1; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="topbar">
    <img class="logo" src="../assets/logo.png" alt="" />
    <span class="topbar-title">Maravilla Konto</span>
    <span class="beta-badge">Beta Program</span>
  </div>

  <section class="hero">
    <div class="hero-left">
      <h1>Swiss Accounting,<br>Simplified.</h1>
      <p class="subtitle">Desktop app for invoicing, bookkeeping, payroll, and more — built for Swiss small businesses.</p>

      <div class="downloads">
        <a id="download-mac" class="download-btn disabled" href="#">
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
          </svg>
          <div class="label">
            <span class="platform">macOS</span>
            <span class="format">Universal DMG</span>
            <span class="unavailable">Coming soon</span>
          </div>
        </a>

        <a id="download-win" class="download-btn disabled" href="#">
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M0 3.449L9.75 2.1v9.451H0m10.949-9.602L24 0v11.4H10.949M0 12.6h9.75v9.451L0 20.699M10.949 12.6H24V24l-12.9-1.801"/>
          </svg>
          <div class="label">
            <span class="platform">Windows</span>
            <span class="format">Installer (.exe)</span>
            <span class="unavailable">Coming soon</span>
          </div>
        </a>
      </div>

      <div id="version-tag" class="version-tag"></div>
    </div>

    <div class="hero-right">
      <img class="screenshot" src="../assets/kontopicture.png" alt="Maravilla Konto - Cash Flow Dashboard" />
    </div>
  </section>

  <section class="notes-section">
    <div class="notes-header">Release Notes</div>
    <div id="release-notes">
      <div class="notes-loading">
        <div class="spinner"></div>
        Loading release notes...
      </div>
    </div>
  </section>

  <footer>
    <p>Maravilla Labs</p>
  </footer>

</div>

<script>
(function() {
  var REPO = 'maravilla-labs/konto';
  var API_URL = 'https://api.github.com/repos/' + REPO + '/releases';
  var CACHE_KEY = 'konto_releases';
  var CACHE_TTL = 5 * 60 * 1000; // 5 minutes

  function getCached() {
    try {
      var raw = sessionStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      var cached = JSON.parse(raw);
      if (Date.now() - cached.ts > CACHE_TTL) return null;
      return cached.data;
    } catch (e) { return null; }
  }

  function setCache(data) {
    try {
      sessionStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: data }));
    } catch (e) { /* ignore */ }
  }

  function loadRelease() {
    var cached = getCached();
    if (cached) return Promise.resolve(cached);

    return fetch(API_URL)
      .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
      .then(function(releases) {
        if (!releases.length) return Promise.reject();
        var release = releases[0];
        setCache(release);
        return release;
      });
  }

  function findAsset(assets, ext) {
    for (var i = 0; i < assets.length; i++) {
      if (assets[i].name.endsWith(ext)) return assets[i];
    }
    return null;
  }

  loadRelease()
    .then(function(release) {
      document.getElementById('version-tag').textContent = release.tag_name;

      var dmg = findAsset(release.assets, '.dmg');
      if (dmg) {
        var macBtn = document.getElementById('download-mac');
        macBtn.href = dmg.browser_download_url;
        macBtn.classList.remove('disabled');
      }

      var exe = findAsset(release.assets, '.exe');
      if (exe) {
        var winBtn = document.getElementById('download-win');
        winBtn.href = exe.browser_download_url;
        winBtn.classList.remove('disabled');
      }

      if (release.body) {
        document.getElementById('release-notes').innerHTML = md(release.body);
      } else {
        document.getElementById('release-notes').innerHTML =
          '<p style="color:var(--text-dim)">No release notes available.</p>';
      }
    })
    .catch(function() {
      document.getElementById('release-notes').innerHTML =
        '<p style="color:var(--text-dim)">No releases available yet. Check back soon.</p>';
      document.getElementById('version-tag').textContent = '';
    });

  function md(t) {
    return t
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
      .replace(/<\/ul>\s*<ul>/g, '')
      .replace(/\n\n/g, '<br><br>');
  }
})();
</script>
</body>
</html>
